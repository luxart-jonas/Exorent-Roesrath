<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MapLibre Basemaps Isoliert-Test</title>
<link href="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.css" rel="stylesheet">
<style>
  body{ font-family:monospace; background:#0c1210; color:#f1efe4; margin:0; padding:0; font-size:13px; }
  #log{ padding:12px; white-space:pre-wrap; word-break:break-all; background:#151d18; border-bottom:2px solid #d9a53f; max-height:50vh; overflow-y:auto; }
  .ok{ color:#6fd9a8; }
  .err{ color:#ff7a63; }
  .warn{ color:#f0be5c; }
  #map{ height:45vh; width:100%; background:#333; }
</style>
</head>
<body>
<div id="log">Startet…</div>
<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@5.24.0/dist/maplibre-gl.js"></script>
<script src="https://unpkg.com/pmtiles@3.2.0/dist/pmtiles.js"></script>
<script src="https://unpkg.com/@protomaps/basemaps@5/dist/basemaps.js" crossorigin="anonymous"></script>
<script>
const PMTILES_URL = 'https://ormpszktwwiahjooukjk.supabase.co/storage/v1/object/public/exotrail-maps/bergisches-land.pmtiles';
const log = document.getElementById('log');
function line(msg, cls){
  const d = document.createElement('div');
  if(cls) d.className = cls;
  d.textContent = msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
}
log.textContent = '';
const t0 = Date.now();
const ts = () => '[+' + (Date.now()-t0) + 'ms]';

line('1. Bibliotheken geladen. maplibregl=' + (typeof maplibregl) + ' pmtiles=' + (typeof pmtiles) + ' basemaps=' + (typeof basemaps));

const protocol = new pmtiles.Protocol();
maplibregl.addProtocol('pmtiles', protocol.tile);
line('2. Protocol registriert.');

// Testet gezielt: wirft basemaps.layers() einen Fehler, oder liefert es
// eine leere/kaputte Liste zurück?
let generatedLayers;
try{
  line('3. Rufe basemaps.namedFlavor("dark") auf…');
  const flavor = basemaps.namedFlavor('dark');
  line('   → Flavor-Objekt erhalten: ' + (typeof flavor) + ', Keys: ' + Object.keys(flavor || {}).length, 'ok');

  line('4. Rufe basemaps.layers("protomaps", flavor, {lang:"de"}) auf…');
  generatedLayers = basemaps.layers('protomaps', flavor, { lang:'de' });
  line('   → ' + (Array.isArray(generatedLayers) ? generatedLayers.length + ' Layer erzeugt' : 'KEIN Array: ' + typeof generatedLayers), Array.isArray(generatedLayers) && generatedLayers.length>0 ? 'ok' : 'err');
}catch(e){
  line('   → FEHLER bei basemaps.layers(): ' + e.message, 'err');
  line('   Stack: ' + e.stack, 'err');
  generatedLayers = [{ id:'bg-fallback', type:'background', paint:{'background-color':'#333'} }];
}

const style = {
  version: 8,
  glyphs: 'https://protomaps.github.io/basemaps-assets/fonts/{fontstack}/{range}.pbf',
  sprite: 'https://protomaps.github.io/basemaps-assets/sprites/v4/dark',
  sources: {
    protomaps: { type: 'vector', url: 'pmtiles://' + PMTILES_URL }
  },
  layers: generatedLayers
};
line('5. Stil zusammengesetzt mit ' + style.layers.length + ' Layern, glyphs+sprite gesetzt.');

const map = new maplibregl.Map({
  container: 'map',
  style,
  center: [7.275, 50.95],
  zoom: 11
});
line('6. map-Objekt erzeugt, warte auf Events…');

let lastEventAt = Date.now();
map.on('load', () => { lastEventAt = Date.now(); line(ts() + ' "load"-Event (Stil geparst).', 'ok'); });
map.on('sourcedata', (e) => {
  if(e.sourceId === 'protomaps'){ lastEventAt = Date.now(); line(ts() + ' sourcedata: isSourceLoaded=' + e.isSourceLoaded); }
});
map.on('styleimagemissing', (e) => { line(ts() + ' styleimagemissing: ' + e.id, 'warn'); });
map.on('idle', () => {
  lastEventAt = Date.now();
  const feats = map.queryRenderedFeatures();
  line(ts() + ' "idle" — sichtbare Objekte: ' + feats.length, feats.length>0?'ok':'err');
});
map.on('error', (e) => {
  lastEventAt = Date.now();
  line(ts() + ' ERROR: ' + (e.error && e.error.message || JSON.stringify(e).slice(0,300)), 'err');
});

// Auch rohe fetch()-Fehler zu Glyphs/Sprites sichtbar machen, die MapLibre
// manchmal nur in der Konsole loggt statt als "error"-Event zu feuern.
const origFetch = window.fetch;
window.fetch = function(...args){
  const url = args[0];
  if(typeof url === 'string' && (url.includes('basemaps-assets'))){
    return origFetch.apply(this, args).then(res => {
      line(ts() + ' fetch ' + (res.ok?'OK':'FEHLER '+res.status) + ': ' + url.slice(0,90), res.ok?'ok':'err');
      return res;
    }).catch(err => {
      line(ts() + ' fetch WARF FEHLER: ' + url.slice(0,90) + ' — ' + err.message, 'err');
      throw err;
    });
  }
  return origFetch.apply(this, args);
};

setTimeout(() => {
  line(ts() + ' 15s vergangen. Letztes Event war vor ' + (Date.now()-lastEventAt) + 'ms.', 'err');
}, 15000);
</script>
</body>
</html>
